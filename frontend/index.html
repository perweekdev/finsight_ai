<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinSight AI — 금융 리포트 분석</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface2: #21253a;
        --border: #2d3150;
        --accent: #4f8ef7;
        --accent2: #7c5df9;
        --green: #22c55e;
        --red: #ef4444;
        --yellow: #f59e0b;
        --text: #e2e8f0;
        --text2: #94a3b8;
        --text3: #64748b;
      }

      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.6;
      }

      /* Header */
      .header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 16px 32px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .header-logo {
        font-size: 22px;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .header-badge {
        font-size: 11px;
        padding: 2px 8px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--text2);
      }

      /* Layout */
      .container { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }
      .layout-two { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

      /* Cards */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
      }
      .card-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card-title .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--accent);
        display: inline-block;
      }

      /* Upload */
      .upload-zone {
        border: 2px dashed var(--border);
        border-radius: 10px;
        padding: 48px 24px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
      }
      .upload-zone:hover, .upload-zone.drag-over {
        border-color: var(--accent);
        background: rgba(79, 142, 247, 0.05);
      }
      .upload-icon { font-size: 40px; margin-bottom: 12px; }
      .upload-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
      .upload-sub { font-size: 13px; color: var(--text2); }
      .upload-input { display: none; }

      /* Spinner */
      .spinner {
        display: inline-block;
        width: 20px; height: 20px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Status bar */
      .status-bar {
        margin-top: 16px;
        padding: 12px 16px;
        background: var(--surface2);
        border-radius: 8px;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text2);
      }
      .status-bar.success { color: var(--green); }
      .status-bar.error { color: var(--red); }

      /* Analysis */
      .company-name {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 8px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .overview-text { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 20px; }

      .case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
      .case-box {
        background: var(--surface2);
        border-radius: 8px;
        padding: 14px;
        border-left: 3px solid;
      }
      .case-box.bull { border-color: var(--green); }
      .case-box.bear { border-color: var(--red); }
      .case-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }
      .case-box.bull .case-label { color: var(--green); }
      .case-box.bear .case-label { color: var(--red); }
      .case-list { list-style: none; }
      .case-list li {
        font-size: 13px;
        color: var(--text2);
        padding: 3px 0;
        display: flex;
        gap: 6px;
      }
      .case-list li::before { content: '•'; opacity: 0.5; flex-shrink: 0; }

      /* Financials table */
      .fin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .fin-table th, .fin-table td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      .fin-table th { color: var(--text3); font-weight: 500; font-size: 12px; }
      .fin-table td { color: var(--text); }
      .fin-table tr:last-child td { border-bottom: none; }
      .fin-table td.value { color: var(--accent); font-weight: 600; }
      .fin-table td.null { color: var(--text3); }

      /* Q&A Panel */
      .mode-toggle {
        display: flex;
        gap: 0;
        background: var(--surface2);
        border-radius: 8px;
        padding: 3px;
        margin-bottom: 16px;
      }
      .mode-btn {
        flex: 1;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 500;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: transparent;
        color: var(--text2);
        transition: all 0.2s;
      }
      .mode-btn.active {
        background: var(--accent);
        color: #fff;
        font-weight: 600;
      }

      .question-form {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
      }
      .question-input {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        color: var(--text);
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }
      .question-input:focus { border-color: var(--accent); }
      .question-input::placeholder { color: var(--text3); }

      .ask-btn {
        padding: 10px 20px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
        white-space: nowrap;
      }
      .ask-btn:hover { opacity: 0.85; }
      .ask-btn:disabled { opacity: 0.4; cursor: not-allowed; }

      .answer-box {
        background: var(--surface2);
        border-radius: 8px;
        padding: 16px;
        font-size: 14px;
        line-height: 1.8;
        color: var(--text);
        min-height: 80px;
        white-space: pre-wrap;
      }
      .answer-empty { color: var(--text3); font-style: italic; }

      .latency-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        padding: 2px 8px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        color: var(--text2);
        margin-top: 8px;
      }

      .sources-list {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .source-item {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent2);
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 12px;
        color: var(--text2);
      }
      .source-meta {
        font-size: 11px;
        color: var(--text3);
        margin-bottom: 4px;
        display: flex;
        justify-content: space-between;
      }
      .similarity-badge {
        font-weight: 600;
        color: var(--accent);
      }

      /* Performance Widget */
      .perf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .perf-stat {
        background: var(--surface2);
        border-radius: 8px;
        padding: 14px;
        text-align: center;
      }
      .perf-stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
      .perf-stat-value { font-size: 24px; font-weight: 700; color: var(--accent); }
      .perf-stat-unit { font-size: 12px; color: var(--text2); margin-top: 2px; }
      .perf-bar-wrap { margin-top: 16px; }
      .perf-bar-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: flex; justify-content: space-between; }
      .perf-bar-bg { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
      .perf-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
      .perf-bar-fill.rag { background: var(--accent); }
      .perf-bar-fill.norag { background: var(--accent2); }

      /* Key issues */
      .issue-tags { display: flex; flex-wrap: wrap; gap: 8px; }
      .issue-tag {
        font-size: 12px;
        padding: 4px 12px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        color: var(--text2);
      }

      /* Utility */
      .hidden { display: none !important; }
      .mt8 { margin-top: 8px; }
      .mt16 { margin-top: 16px; }
      .section-sep { height: 1px; background: var(--border); margin: 20px 0; }
      .placeholder-state {
        text-align: center;
        padding: 40px 24px;
        color: var(--text3);
        font-size: 14px;
      }
      .placeholder-state .icon { font-size: 32px; margin-bottom: 10px; }

      @media (max-width: 768px) {
        .layout-two { grid-template-columns: 1fr; }
        .case-grid { grid-template-columns: 1fr; }
        .perf-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <span class="header-logo">⚡ FinSight AI</span>
      <span class="header-badge">RAG vs 비RAG 비교 데모</span>
    </header>

    <main class="container">
      <!-- Upload Section -->
      <div class="card" id="upload-section" style="margin-bottom: 24px;">
        <div class="card-title"><span class="dot"></span>금융 리포트 업로드</div>
        <div id="upload-panel"></div>
      </div>

      <!-- Main Content (hidden until upload) -->
      <div class="layout-two hidden" id="main-content">
        <!-- Left Column -->
        <div style="display: flex; flex-direction: column; gap: 24px;">
          <div class="card" id="analysis-section">
            <div class="card-title"><span class="dot"></span>기업 분석</div>
            <div id="analysis-panel"></div>
          </div>
          <div class="card" id="metrics-section">
            <div class="card-title"><span class="dot"></span>재무 지표</div>
            <div id="metrics-panel"></div>
          </div>
        </div>

        <!-- Right Column -->
        <div style="display: flex; flex-direction: column; gap: 24px;">
          <div class="card" id="qa-section">
            <div class="card-title"><span class="dot"></span>질의응답</div>
            <div id="qa-panel"></div>
          </div>
          <div class="card" id="perf-section">
            <div class="card-title"><span class="dot"></span>성능 비교 (RAG vs 비RAG)</div>
            <div id="perf-panel"></div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
